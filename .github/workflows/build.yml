name: Build
on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]
jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4.1.1
        with:
          fetch-depth: 0

      - name: Set up JDK
        uses: actions/setup-java@v4.0.0
        with:
          java-version: 17
          distribution: corretto
          cache: maven

      - name: Build
        run: mvn clean package
